name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build release package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ZIP
        run: zip -r dihor-ha-background.zip custom_components README.md hacs.json

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dihor-ha-background.zip
          generate_release_notes: true

